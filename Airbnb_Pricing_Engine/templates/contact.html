{% extends 'base.html' %}

{% block title %}Contact - PriceWise{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-8 mx-auto">
        <div class="card-cosmic p-4">
            <div class="text-center mb-4">
                <i class="fas fa-envelope" style="font-size: 48px; color: #00D4FF;"></i>
                <h2 class="mt-3"><span class="glow-text">Get In Touch</span></h2>
                <p class="text-secondary">Have questions about PriceWise? We'd love to hear from you!</p>
            </div>

            <form>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label><i class="fas fa-user text-primary"></i> Full Name</label>
                        <input type="text" class="form-control" placeholder="John Doe" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white;">
                    </div>
                    <div class="col-md-6">
                        <label><i class="fas fa-envelope text-primary"></i> Email</label>
                        <input type="email" class="form-control" placeholder="john@example.com" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white;">
                    </div>
                    <div class="col-12">
                        <label><i class="fas fa-tag text-primary"></i> Subject</label>
                        <input type="text" class="form-control" placeholder="How can we help?" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white;">
                    </div>
                    <div class="col-12">
                        <label><i class="fas fa-comment text-primary"></i> Message</label>
                        <textarea class="form-control" rows="4" placeholder="Your message here..." style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 12px; color: white;"></textarea>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-glow mt-4 w-100">
                    <i class="fas fa-paper-plane"></i> Send Message
                </button>
            </form>

            <hr class="border-secondary opacity-25 my-4">

            <div class="row text-center">
                <div class="col-4">
                    <i class="fas fa-envelope" style="font-size: 24px; color: #00D4FF;"></i>
                    <p class="text-secondary" style="font-size: 12px;">services@pricewise.com</p>
                </div>
                <div class="col-4">
                    <i class="fas fa-phone" style="font-size: 24px; color: #7B2FFC;"></i>
                    <p class="text-secondary" style="font-size: 12px;">+91 93365 76683</p>
                </div>
                <div class="col-4">
                    <i class="fas fa-globe" style="font-size: 24px; color: #FF6B9D;"></i>
                    <p class="text-secondary" style="font-size: 12px;">www.pricewise.com</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
